name: Build Unsigned IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Force Disable All Signing
        run: |
          # Create a master override file to force-disable signing on all dependencies
          echo "CODE_SIGN_IDENTITY =" > override.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> override.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> override.xcconfig
          echo "ENTITLEMENTS_REQUIRED = NO" >> override.xcconfig
          # Disable the framework copy check
          sed -i '' 's/CodeSignOnCopy = 1/CodeSignOnCopy = 0/g' CameraAccess.xcodeproj/project.pbxproj || true

      - name: Build App (Ignore Exit 65)
        run: |
          # The '|| true' forces the script to continue even if Xcode throws an error
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme TurboMeta \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            -xcconfig override.xcconfig \
            || true

      - name: Create IPA
        run: |
          mkdir -p Payload
          # Search for the .app folder Xcode left behind
          APP_PATH=$(find build_output/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Success! Found app at: $APP_PATH"
            # ditto perfectly preserves Apple's hidden framework symlinks
            ditto "$APP_PATH" "Payload/$(basename "$APP_PATH")"
            # zip -y ensures those symlinks survive the zipping process for Signulous
            zip -ry TurboMeta.ipa Payload
          else
            echo "Error: Xcode failed to output the .app file."
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TurboMeta-App
          path: TurboMeta.ipa
