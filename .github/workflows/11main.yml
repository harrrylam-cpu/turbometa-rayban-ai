name: Proper iOS Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Configure Build Settings
        run: |
          # Create a configuration file to force-disable signing at the root level
          cat <<EOF > build.xcconfig
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGN_IDENTITY = 
          AD_HOC_CODE_SIGNING_ALLOWED = YES
          ENTITLEMENTS_REQUIRED = NO
          PROVISIONING_PROFILE_SPECIFIER = 
          DEVELOPMENT_TEAM = 
          EOF

      - name: Build App (The Proper Way)
        run: |
          # We use -skipPackagePluginValidation to stop SPM from crying about unsigned Meta tools
          # We use the 'TurboMeta' scheme which we verified from your logs
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme TurboMeta \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            -xcconfig build.xcconfig \
            -skipPackagePluginValidation \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Locate the .app folder in the output
          APP_PATH=$(find build_output/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Found compiled app at: $APP_PATH"
            # Using ditto to preserve the internal structure Meta requires
            ditto "$APP_PATH" "Payload/$(basename "$APP_PATH")"
            # Using -ry to keep the Meta SDK symlinks alive for Signulous
            zip -ry TurboMeta.ipa Payload
          else
            echo "Error: Build failed to produce an .app file."
            exit 1
          fi

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: TurboMeta-App
          path: TurboMeta.ipa
