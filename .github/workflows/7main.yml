name: Build Unsigned IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App with Ad-Hoc Signature
        run: |
          # The minus sign (-) creates a fake local signature to bypass Xcode's strict checks
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme TurboMeta \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build_output/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cp -r "$APP_PATH" Payload/
            zip -r TurboMeta.ipa Payload
          else
            echo "Error: .app file not found! Xcode failed to output the app."
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TurboMeta-App
          path: TurboMeta.ipa
