name: Build Unsigned IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: List Schemes (For Debugging)
        run: xcodebuild -list -project CameraAccess.xcodeproj

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -archivePath build/CameraAccess.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GENERATE_INFOPLIST_FILE=YES

      - name: Create IPA
        run: |
          mkdir -p Payload
          if [ -d "build/CameraAccess.xcarchive/Products/Applications/CameraAccess.app" ]; then
            cp -r build/CameraAccess.xcarchive/Products/Applications/CameraAccess.app Payload/
            zip -r TurboMeta.ipa Payload
          else
            echo "Build failed: Application not found in archive."
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TurboMeta-App
          path: TurboMeta.ipa
