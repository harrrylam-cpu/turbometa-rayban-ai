name: Proper iOS Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Configure Build Settings
        run: |
          # Create a master configuration file to force-disable signing globally
          cat <<EOF > build.xcconfig
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGN_IDENTITY = 
          AD_HOC_CODE_SIGNING_ALLOWED = YES
          ENTITLEMENTS_REQUIRED = NO
          PROVISIONING_PROFILE_SPECIFIER = 
          DEVELOPMENT_TEAM = 
          EOF

      - name: Build App (The Final Proper Attempt)
        run: |
          # Clean and build using the verified 'TurboMeta' scheme
          # We add Macro and Plugin skipping to bypass Meta SDK security checks
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme TurboMeta \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            -xcconfig build.xcconfig \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          # Locate the .app folder created by the build
          APP_PATH=$(find build_output/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Success! Found app at: $APP_PATH"
            # ditto is used to preserve the internal structure of the Meta SDK
            ditto "$APP_PATH" "Payload/$(basename "$APP_PATH")"
            # zip -ry ensures framework symlinks survive for Signulous/Sideloadly
            zip -ry TurboMeta.ipa Payload
          else
            echo "Error: Xcode failed to output the .app file."
            exit 1
          fi

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: TurboMeta-App
          path: TurboMeta.ipa
